<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الملكية | Hassany Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>body { background-color: #050505; color: white; font-family: sans-serif; }</style>
</head>
<body class="p-4">

    <!-- الجدول -->
    <div class="overflow-x-auto bg-gray-900 p-6 rounded-2xl border border-gray-700">
        <table class="w-full text-right" id="mainTable">
            <thead><tr class="text-gray-400 border-b border-gray-700">
                <th class="p-3">الاسم</th><th class="p-3">الباقة</th><th class="p-3">انتهاء الضمان</th><th class="p-3">إجراءات</th>
            </tr></thead>
            <tbody id="dataBody"></tbody>
        </table>
    </div>

    <!-- قالب الوثيقة (مخفي) -->
    <div id="warrantyCard" class="absolute -left-[9999px] bg-gradient-to-br from-blue-900 to-black p-8 w-[600px] text-white border-2 border-yellow-500 rounded-2xl">
        <h1 class="text-3xl font-bold text-yellow-500">وثيقة ضمان Hassany Store</h1>
        <div class="mt-6 space-y-4 text-xl">
            <p>اسم المشترك: <span id="valName" class="font-bold"></span></p>
            <p>نوع الباقة: <span id="valPackage" class="text-yellow-400"></span></p>
            <p>ضمان لغاية: <span id="valDate" class="text-green-400"></span></p>
        </div>
    </div>

    <script>
        // ضع هنا رابط Web App الذي حصلت عليه من Google Apps Script
        const API_URL = "رابط_الـ_Web_App_الخاص_بك";

        async function loadData() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const tbody = document.getElementById('dataBody');
            
            data.forEach((item, index) => {
                tbody.innerHTML += `
                    <tr class="border-b border-gray-800">
                        <td class="p-3">${item.الاسم}</td>
                        <td class="p-3 text-yellow-500">${item.الباقة}</td>
                        <td class="p-3">${item.تاريخ_الانتهاء}</td>
                        <td class="p-3">
                            <button onclick="downloadWarranty('${item.الاسم}', '${item.الباقة}', '${item.تاريخ_الانتهاء}')" 
                            class="bg-blue-600 px-4 py-1 rounded">استخراج الوثيقة</button>
                        </td>
                    </tr>`;
            });
        }

        function downloadWarranty(name, pack, date) {
            document.getElementById('valName').innerText = name;
            document.getElementById('valPackage').innerText = pack;
            document.getElementById('valDate').innerText = date;
            
            const card = document.getElementById('warrantyCard');
            card.style.left = "0px";
            html2canvas(card).then(canvas => {
                card.style.left = "-9999px";
                let link = document.createElement('a');
                link.download = `ضمان_${name}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
        loadData();
    </script>
</body>
</html>
