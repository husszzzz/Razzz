<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASSANY STORE | المتجر الرسمي</title>
    <style>
        :root {
            --accent: #00d2ff;
            --accent-secondary: #3a7bd5;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* تأثير الإضاءة العائمة */
        .glow-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 20%, rgba(0, 210, 255, 0.15), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* الهيدر */
        .header {
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* البطاقات المطورة */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        /* أيقونة التطبيق بتأثير ثلاثي الأبعاد */
        .app-box {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .card-desc {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 20px;
            display: block;
        }

        /* الأزرار الاحترافية */
        .btn-main {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-main:active { transform: scale(0.97); }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 15px;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        /* قسم الدعم */
        .support-info {
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: right;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            padding: 2px;
        }

        /* المؤقت */
        .status-box {
            margin-top: 15px;
            font-size: 13px;
            display: none;
        }

        .timer-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .timer-progress {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 1s linear;
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="container">
        
        <header class="header">
            <h1>HASSANY STORE</h1>
        </header>

        <div class="glass-card">
            <div class="app-box">ES</div>
            <span class="card-title">E-Sign Premium</span>
            <span class="card-desc">أحدث إصدار (4.8.2) | شهادة أرامكو النشطة</span>
            
            <button class="btn-main" id="installBtn" onclick="runInstaller()">تثبيت التطبيق</button>
            
            <div class="status-box" id="statusBox">
                <span id="statusText">يتم الآن تجهيز الرابط...</span>
                <div class="timer-bar"><div class="timer-progress" id="progressBar"></div></div>
            </div>
        </div>

        <div class="glass-card">
            <span class="card-title" style="font-size: 16px;">ملفات الشهادة (Aramco)</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <a href="https://github.com/husszzzz/coomCraft/raw/refs/heads/main/Aramco%20Services%20Company.p12" class="btn-secondary">ملف P12</a>
                <a href="https://github.com/husszzzz/coomCraft/raw/refs/heads/main/Aramco%20Services%20Company.mobileprovision" class="btn-secondary">البروفايجن</a>
            </div>
        </div>

        <div class="glass-card" style="padding: 15px 25px;">
            <div class="support-info">
                <div style="font-size: 24px;">👨🏻‍💻</div>
                <div style="flex: 1;">
                    <span style="font-weight: 700; display: block;">حسين الحسني</span>
                    <span style="font-size: 12px; color: #777;">@Om_G9 | دعم فني مباشر</span>
                </div>
                <a href="https://t.me/Om_G9" style="color: var(--accent); text-decoration: none; font-weight: bold;">تواصل</a>
            </div>
        </div>

        <div class="footer">
            Built by <b>Hassany</b> &bull; 2026
        </div>
    </div>

    <audio id="clickSound">
        <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
    </audio>

    <script>
        function runInstaller() {
            const btn = document.getElementById('installBtn');
            const statusBox = document.getElementById('statusBox');
            const progress = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            const sound = document.getElementById('clickSound');
            
            sound.play();
            btn.style.display = 'none';
            statusBox.style.display = 'block';
            
            let width = 0;
            const interval = setInterval(() => {
                width += 20;
                progress.style.width = width + '%';
                
                if (width >= 100) {
                    clearInterval(interval);
                    statusText.innerText = "جاري فتح طلب التثبيت...";
                    setTimeout(() => {
                        window.location.href = "itms-services://?action=download-manifest&url=https://github.com/sanjivanikaluste1-ctrl/ipa-host/releases/download/v11/87d33a6a-e96b-41aa-ada9-4eb15c5d1e38.plist";
                        statusText.innerText = "افحص الشاشة الرئيسية الآن ✅";
                    }, 500);
                }
            }, 1000);
        }
    </script>
</body>
</html>
